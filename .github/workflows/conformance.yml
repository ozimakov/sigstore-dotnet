name: Conformance

on:
  workflow_dispatch:
  push:
    branches: [main]
  schedule:
    - cron: '0 6 * * 1'

jobs:
  conformance:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    strategy:
      fail-fast: false
      matrix:
        dotnet: ['8.x', '9.x', '10.x']
        include:
          - dotnet: '8.x'
            framework: net8.0
          - dotnet: '9.x'
            framework: net9.0
          - dotnet: '10.x'
            framework: net10.0
    permissions:
      contents: read
      id-token: write # Required for OIDC token exchange in signing tests
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet }}

      - name: Publish conformance CLI
        run: dotnet publish src/Sigstore.Conformance/Sigstore.Conformance.csproj -c Release --framework ${{ matrix.framework }} -o "${GITHUB_WORKSPACE}/sigstore-tool"

      # The conformance suite hits Sigstore production infra (Fulcio/Rekor/TUF).
      # Transient infra blips show up as setup errors on the first test; retry once.
      - name: Run sigstore-conformance (attempt 1)
        id: conformance_try1
        continue-on-error: true
        timeout-minutes: 10
        uses: sigstore/sigstore-conformance@v0.0.25
        with:
          entrypoint: ${{ github.workspace }}/sigstore-tool/sigstore-dotnet
          skip-cpython-release-tests: true

      - name: Run sigstore-conformance (attempt 2)
        if: steps.conformance_try1.outcome == 'failure'
        timeout-minutes: 12
        uses: sigstore/sigstore-conformance@v0.0.25
        with:
          entrypoint: ${{ github.workspace }}/sigstore-tool/sigstore-dotnet
          skip-cpython-release-tests: true

      - name: Upload conformance logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-results-${{ matrix.framework }}-${{ github.run_id }}
          path: |
            **/*conformance*
            **/pytest*.log
