name: Conformance

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

jobs:
  conformance:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dotnet: ['8.x', '9.x', '10.x']
        include:
          - dotnet: '8.x'
            framework: net8.0
          - dotnet: '9.x'
            framework: net9.0
          - dotnet: '10.x'
            framework: net10.0
    permissions:
      contents: read
      id-token: write # Required for OIDC token exchange in signing tests
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet }}

      - name: Publish conformance CLI
        run: dotnet publish src/Sigstore.Conformance/Sigstore.Conformance.csproj -c Release --framework ${{ matrix.framework }} -o "${GITHUB_WORKSPACE}/sigstore-tool"

      - name: Run sigstore-conformance
        uses: sigstore/sigstore-conformance@v0.0.25
        with:
          entrypoint: ${{ github.workspace }}/sigstore-tool/sigstore-dotnet
          skip-cpython-release-tests: true
          # xfail: positive tests needing DSSE-digest support + negative validation gaps
          xfail: 'test_verify*DIGEST-rekor2-dsse-happy-path] test_verify*DIGEST-happy-path-intoto-in-dsse*] test_verify*DIGEST-intoto-with-custom*] test_verify*rekor2-checkpoint-origin-not-first] test_verify*checkpoint-bad-keyhint_fail] test_verify*invalid-ct-key_fail] test_verify*integrated-time-in-future_fail] test_verify*PATH-dsse-mismatch*_fail] test_verify*PATH-intoto-log-entry-mismatch_fail] test_verify*PATH-intoto-missing-inclusion-proof_fail] test_verify*PATH-intoto-tsa*_fail] test_verify*PATH-rekor2-dsse-mismatch*_fail] test_verify*PATH-rekor2-timestamp-outside-trust-root*_fail] test_verify*rekor2-timestamp-payload*_fail] test_verify*rekor2-timestamp-untrusted*_fail] test_verify*DIGEST-managed-key-wrong-key_fail] test_verify*DIGEST-rekor2-timestamp-outside-trust-root*_fail]'

      - name: Upload conformance logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-results-${{ matrix.framework }}-${{ github.run_id }}
          path: |
            **/*conformance*
            **/pytest*.log
