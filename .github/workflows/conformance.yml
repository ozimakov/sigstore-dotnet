name: Conformance

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

jobs:
  conformance:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Required for OIDC token exchange in signing tests
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Publish conformance CLI
        run: dotnet publish src/Sigstore.Conformance/Sigstore.Conformance.csproj -c Release --framework net10.0 -o "${GITHUB_WORKSPACE}/sigstore-tool"

      - name: Run sigstore-conformance
        uses: sigstore/sigstore-conformance@v0.0.25
        with:
          entrypoint: ${{ github.workspace }}/sigstore-tool/sigstore-dotnet
          skip-signing: true
          # xfail tests requiring features not yet implemented:
          # - Ed25519 checkpoint verification (rekor2 positive tests)
          # - In-toto/DSSE verification, managed-key, SCT, digest input mode
          # - Missing negative validations (bundle version, log index, keyhint, roothash, hashedrekord, timestamp, CT key)
          # - CPython release bundles (require Ed25519 checkpoint)
          skip-cpython-release-tests: true
          xfail: 'test_verify*PATH-rekor2*happy*] test_verify*PATH-rekor2*checkpoint*cosig*] test_verify*PATH-rekor2*two-sigs*] test_verify*PATH-rekor2*origin-not-first] test_verify*PATH-rekor2*timestamp-with-expired*] test_verify*PATH-rekor2*timestamp-without*] test_verify*PATH-rekor2*timestamp-with-embedded*] test_verify*PATH-intoto*happy*] test_verify*intoto-in-dsse*] test_verify*intoto-with-custom*] test_verify*managed-key-happy*] test_verify*managed-key-and*] test_verify*bundle-with-sct*] test_verify*DIGEST-happy*] test_verify*DIGEST-rekor2*happy*] test_verify*DIGEST-rekor2*timestamp-with-embedded*] test_verify*DIGEST-rekor2*checkpoint*cosig*] test_verify*DIGEST-rekor2*two-sigs*] test_verify*DIGEST-rekor2*origin-not-first] test_verify*DIGEST-rekor2*timestamp-with-expired*] test_verify*DIGEST-rekor2*timestamp-without*] test_verify*PATH-integrated-time-in-future*] test_verify*PATH-wrong-hashedrekord*] test_verify*PATH-checkpoint-wrong-roothash*] test_verify*PATH-checkpoint-bad-keyhint*] test_verify*PATH-bundle-unknown-version*] test_verify*PATH-bundle-negative-log-index*] test_verify*PATH-invalid-ct-key*]'

      - name: Upload conformance logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-results-${{ github.run_id }}
          path: |
            **/*conformance*
            **/pytest*.log
