name: Conformance

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

jobs:
  conformance:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dotnet: ['8.x', '9.x', '10.x']
        include:
          - dotnet: '8.x'
            framework: net8.0
          - dotnet: '9.x'
            framework: net9.0
          - dotnet: '10.x'
            framework: net10.0
    permissions:
      contents: read
      id-token: write # Required for OIDC token exchange in signing tests
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet }}

      - name: Publish conformance CLI
        run: dotnet publish src/Sigstore.Conformance/Sigstore.Conformance.csproj -c Release --framework ${{ matrix.framework }} -o "${GITHUB_WORKSPACE}/sigstore-tool"

      - name: Run sigstore-conformance
        uses: sigstore/sigstore-conformance@v0.0.25
        with:
          entrypoint: ${{ github.workspace }}/sigstore-tool/sigstore-dotnet
          skip-cpython-release-tests: true
          # 2 remaining xfails: signing test (needs staging config), SET verification (invalid SET not detected)
          xfail: 'test_sign_verify_rekor2 test_verify*integrated-time-in-future_fail]'

      - name: Upload conformance logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-results-${{ matrix.framework }}-${{ github.run_id }}
          path: |
            **/*conformance*
            **/pytest*.log
