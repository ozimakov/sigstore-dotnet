name: Conformance

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

jobs:
  conformance:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Publish conformance CLI
        run: dotnet publish src/Sigstore.Conformance/Sigstore.Conformance.csproj -c Release --framework net9.0 -o "${GITHUB_WORKSPACE}/sigstore-tool"

      - name: Run sigstore-conformance
        uses: sigstore/sigstore-conformance@v0.0.25
        with:
          entrypoint: ${{ github.workspace }}/sigstore-tool/sigstore-dotnet
          xfail: 'test_verify*intoto* test_verify*managed-key-happy-path] test_verify*managed-key-and-trusted-root]'

      - name: Upload conformance logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-results
          path: |
            **/*conformance*
            **/pytest*.log
