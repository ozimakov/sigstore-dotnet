name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        dotnet: ['8.x', '9.x', '10.x']
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet }}

      - name: Restore
        run: dotnet restore sigstore-dotnet.sln

      - name: Build
        run: dotnet build sigstore-dotnet.sln --configuration Release --no-restore

      - name: Test
        run: dotnet test sigstore-dotnet.sln --configuration Release --no-build --collect:"XPlat Code Coverage" --settings tests/coverage.runsettings

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        if: matrix.os == 'ubuntu-latest' && matrix.dotnet == '10.x'
        with:
          files: '**/coverage.cobertura.xml'
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
