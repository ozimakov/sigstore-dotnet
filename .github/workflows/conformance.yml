name: Conformance

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'

jobs:
  conformance:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        dotnet: ['8.x', '9.x', '10.x']
        include:
          - dotnet: '8.x'
            framework: net8.0
          - dotnet: '9.x'
            framework: net9.0
          - dotnet: '10.x'
            framework: net10.0
    permissions:
      contents: read
      id-token: write # Required for OIDC token exchange in signing tests
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ matrix.dotnet }}

      - name: Publish conformance CLI
        run: dotnet publish src/Sigstore.Conformance/Sigstore.Conformance.csproj -c Release --framework ${{ matrix.framework }} -o "${GITHUB_WORKSPACE}/sigstore-tool"

      - name: Run sigstore-conformance
        uses: sigstore/sigstore-conformance@v0.0.25
        with:
          entrypoint: ${{ github.workspace }}/sigstore-tool/sigstore-dotnet
          skip-signing: true
          skip-cpython-release-tests: true
          # Remaining xfails:
          # - SCT verification not implemented
          # - Key hint enforcement not strict
          # - canonicalizedBody cross-check not implemented (wrong-hashedrekord)
          # - Some DIGEST-mode DSSE/intoto tests (digest input for DSSE is ambiguous)
          # - Some negative tests where our verifier doesn't detect the specific error
          xfail: 'test_verify*bundle-with-sct*] test_verify*checkpoint-bad-keyhint*] test_verify*wrong-hashedrekord*] test_verify*invalid-ct-key*] test_verify*DIGEST*intoto*] test_verify*DIGEST*rekor2*dsse*] test_verify*DIGEST*rekor2*checkpoint-origin*] test_verify*dsse-mismatch*] test_verify*intoto-log-entry*] test_verify*intoto-missing-inclusion*] test_verify*intoto-tsa*] test_verify*DIGEST*signature-mismatch*] test_verify*DIGEST*managed-key-wrong*] test_verify*rekor2*timestamp-outside*] test_verify*rekor2*timestamp-untrusted*] test_verify*rekor2*timestamp-payload*] test_verify*integrated-time-in-future*] test_verify*rekor2*checkpoint-origin-not-first]'

      - name: Upload conformance logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: conformance-results-${{ matrix.framework }}-${{ github.run_id }}
          path: |
            **/*conformance*
            **/pytest*.log
