coverage:
  status:
    project:
      default:
        target: 35%
        threshold: 2%
    patch:
      default:
        informational: true

# Protobuf-generated code is excluded at test-collection time via
# tests/coverage.runsettings. The pipeline classes (VerificationPipeline,
# RekorClient, FulcioClient, SignedNoteVerifier) appear under-covered here
# because their integration paths are exercised by the conformance suite
# (132 passing) and interop tests (15 passing) — those run separately.
ignore:
  - "src/Sigstore/Protos"
  - "**/Protos/**"
  - "**/obj/**"
  - "src/Sigstore.Conformance/**"
  - "tests/**"
