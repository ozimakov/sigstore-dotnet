name: Feature request
description: Suggest an improvement or new capability
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the suggestion. Please describe what you'd like to see and why.

  - type: textarea
    id: motivation
    attributes:
      label: Motivation
      description: What problem does this solve, or what use case does it enable? What are you trying to do that you can't do today?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed API or behaviour
      description: Sketch the API shape or describe the behaviour change. Code examples are very welcome.
      placeholder: |
        // Example of what the API might look like
        var policy = VerificationPolicy.ForOciArtifact(registry: "ghcr.io", repository: "my-org/my-image");
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you've thought about, or workarounds you're currently using.
    validations:
      required: false
