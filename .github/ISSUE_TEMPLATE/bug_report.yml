name: Bug report
description: Something isn't working as expected
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug. Please fill out all required fields to help us reproduce and fix the issue quickly.

  - type: input
    id: version
    attributes:
      label: Package version
      placeholder: "0.1.0"
    validations:
      required: true

  - type: dropdown
    id: tfm
    attributes:
      label: Target framework
      options:
        - net8.0
        - net9.0
        - net10.0
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Linux
        - macOS
        - Windows
    validations:
      required: true

  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal code or steps that reproduce the issue. Include the bundle JSON or a description of the bundle if possible.
      placeholder: |
        string bundleJson = "...";
        byte[] artifact = ...;
        var result = await verifier.VerifyAsync(...);
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual behaviour
      description: Include the full exception type, message, and stack trace if applicable.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Anything else that might be relevant — bundle media type, signing identity type, custom trusted root, etc.
    validations:
      required: false
